####{ CreativeBC }####| +Resizable |####[ github.com/wfurphy/creative-button-card-templates ]####>
# :: @Changes v0.3::> added `min_height`, `max_height`, `max_width` and `min_width`.
resizable:
  variables:
    height:
    width:
    min_height:
    max_height:
    min_width:
    max_width:
  styles:
    card:
      - height: "[[[ return variables.height ]]]"
      - width: "[[[ return variables.width ]]]"
      - max-height: "[[[ return variables.max_height ]]]"
      - max-width: "[[[ return variables.max_width ]]]"
      - min-height: "[[[ return variables.min_height ]]]"
      - min-width: "[[[ return variables.min_width ]]]"

