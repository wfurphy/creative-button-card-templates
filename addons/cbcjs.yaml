############| +Addon > Creative Button-Card Javascript Object (cbcjs) |###########################>
cbcjs:
  template:
    - cbc_settings
    - cbc_css
    - bc_config
    - cbc_helpers
    - stage # REMOVE FOR PRODUCTION - INTERNAL USE ONLY
  variables:
    __cbc_version: v0.3.0
    __cbc_lovelace_method: "[[[ return hass?.panels?.[hass.panelUrl]?.config?.mode ?? 'unknown' ]]]"
    __cbc_error: >
      [[[
        return class CBCError extends Error {
          constructor (message, extra) {
            super(message);
            this.extra = extra;
            this.cbcjs = window?.cbcJS ?? null;
          }
        }
      ]]]
    __cbc_warn: >
      [[[
        return class CBCWarn extends CBCError {};
      ]]]
    # __cbc_settings: "[[[ return variables.__cbc_settings ]]]"

    __cbc_js_class: >
      [[[
        return class CreativeButtonCardsJS {
          /**
           * LS.<OP> LocalStorage Operations:
           *   DEFAULT: Retrieve and only overwrite if undefined or empty
           *   SET: Override any existing value and return new value
           *   UPDATE: Retrieve and only overwrite if different
           *   INCREMENT: Increment stored number by provided value (or 1)
           *   MAP: Merge a new MAP with the stored MAP and return merged
           *   DELETE: Remove item from storage
           * @type {object}
           */
          LS = {
            DEFAULT: 0,
            SET: 10,
            UPDATE: 20,
            INCREMENT: 30,
            MAP: 40,
            DELETE: 90,
          };

          /**
           * C.<TYPE> Console Notice Level
           *   ERROR, WARN, LOG, INFO, DEBUG
           * @type {object}
           */
          C = {
            ERROR: 'error',
            WARN: 'warn',
            LOG: 'log',
            INFO: 'info',
            DEBUG: 'debug',
          };

          /**
           * Create a new CBCJS instance.
           * @param {object} hass Home Assistant object
           */
          constructor(hass) {
            this.update = false;
            this.globals = {};
            this.hass = hass;
            this.updatedAt = new Date();
            this.debug = variables?.__cbcjs_debug ?? false;
            this.stats = this.__normStats(this.__ls('stats') ?? {});
            this.statsDirty = false;
            this.statsTimer = null;
            this.statsDelayMs = 1000;
            this.__setNewPanel(hass);
            this.css = variables?.__cbc_css ? new Map(Object.entries(variables?.__cbc_css ?? {})) : new Map();
            this.css = this.__ls(
              'css',
              this.css,
              this.LS.MAP
            );
            this.checkUpdates = this.__ls(
              'check_version',
              variables?.__cbc_settings?.check_version?.auto ?? true,
              this.LS.SET,
            );
            this.checkFrequency = this.__ls(
              'check_frequency',
              Math.min(Math.max(variables?.__cbc_settings?.check_version?.frequency ?? 14, 7), 90),
              this.LS.SET,
            );
            this.checkNotify = this.__ls(
              'check_notify',
              variables?.__cbc_settings?.check_version?.notify ?? true,
              this.LS.SET,
            );
            this.generateStats = this.__ls(
              'generate_stats',
              variables?.__cbc_settings?.stats?.generate ?? false,
              this.LS.SET,
            );
            this.hashPanels = this.__ls('hash_panels')
            if (this.hashPanels !== variables?.__cbc_settings?.stats?.hash_panels) {
              this.__lsDelete('stats');
              this.hashPanels = this.__ls(
                'hash_panels',
                variables?.__cbc_settings?.stats?.hash_panels,
                this.LS.SET
              );
            }
            this.version = this.__ls('version', variables?.__cbc_version || 'v0.0.0', this.LS.UPDATE);
            this.availableVersion = this.__ls('available_version');
            this.updateLink = this.__ls('update_link');
            this.firstCheck = this.__ls('first_check', null);
            this.lastFail = this.__ls('check_last_fail');
            this.failQty = this.__ls('check_fail_qty', 0);
            this.checkQty = this.__ls('check_qty', 0);
          }

          /**
           * Run a light effect on a target entity.
           * @param {string} ef Effect name
           * @param {string} entity Entity id
           */
          runLightEffect(ef, entity) {
            const data = {
              entity_id: entity,
              effect: ef,
            };

            let theme = this.hass.states[`select.${entity.replace('light.', '')}_theme`]?.state;
            if (theme && theme !== 'unknown') data.theme = theme;
            this.hass.callService('light', 'turn_on', data);
          }

          /**
           * Select an option on a select entity.
           * @param {string} val Option name
           * @param {string} entity Entity id
           */
          selectOption(val, entity) {
            this.hass.callService('select', 'select_option', {
              entity_id: entity,
              option: val,
            });
          }

          /**
           * Call a Home Assistant service action.
           * @param {string} domain Service domain
           * @param {string} action Service action
           * @param {object} data Service payload
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          action(domain, action, data) {
            this.hass.callService(domain, action, data);

            return this;
          }

          /**
           * Execute a list of service actions.
           * @param {Array} list List of [domain, action, data]
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          actionList(list = []) {
            list.forEach((l) => this.action(...l));
            return this;
          }

          /**
           * Add CSS variables for templates.
           * @param {object|Map} css CSS variable Map { identifier => { property: value, ... } ... }
           * @see {YAML} in /addons/cbc_css.yaml
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          addCss(css = {}) {
            if (css instanceof Map) {
              this.css = this.__ls(...css, this.LS.MAP);
            } else if (typeof css === 'object') {
              this.css = this.__ls(...Object.entries(css), this.LS.Map);
            } else {
              this.handler('Invalid CSS parameter. Must be an object or Map.', { css });
              return this;
            }

            return this.insertStyles();
          }

          /**
           * Add a single CSS variable for templates.
           * @param {string} cssId CSS identifier
           * @param {string} prop CSS property name
           * @param {string} value CSS variable value
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          addStyle(cssId, prop, value) {
            if ((!cssId || typeof cssId !== 'string') ||
                (!prop || typeof prop !== 'string') ||
                (!value || typeof value !== 'string')) {
              this.handler('Invalid CSS parameters. cssId, prop & value must be non-empty strings.', { cssId, prop, value });
              return this;
            }

            this.__ls({[cssId]: { [prop]: value }}, this.LS.MAP);
            return this.insertStyles();
          }

          /**
           * Add a CSS variable to the :root selector for global use in templates.
           * @param {string} varName CSS variable name (without --cbc- prefix)
           * @param {string} value CSS variable value
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          addCssVar(varName, value) {
            if ((!varName || typeof varName !== 'string') || (!value || typeof value !== 'string')) {
              this.handler('Invalid CSS parameters. varName & value must be non-empty strings.', { varName, value });
              return this;
            }

            varName = `--cbc-${varName.replace(/^(--cbc-|--)/, '')}`;
            return this.addStyle(':root', varName, value);
          }

          /**
           * Set the current view path.
           * @param {string} path View path (default: current window location)
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          setView(path) {
            path = path ?? window.location.pathname;
            this.view = path.split('/').pop() || 'unknown';
            return this.insertStyles();
          }

          /**
           * Insert CSS variables into the page when view changes.
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          insertStyles() {
            const styles = document.head.querySelector('style#cbc-styles') ?? document.createElement('style');

            if (styles.id !== 'cbc-styles') {
              styles.id = 'cbc-styles';
              styles.setAttribute('data-cbc-view', this.view);
            }

            styles.innerHTML = '';

            for (const [selector, declarations] of this.css) {
              styles.innerHTML += `\n${selector} {\n`;

              for (const [prop, val] of Object.entries(declarations)) {
                styles.innerHTML += `  ${prop}: ${val};\n`;
              }

              styles.innerHTML += '}\n';
            }

            document.head.appendChild(styles);
            return this;
          }

          /**
           * Centralized handler for errors, warnings, and debug messages.
           * @param {Error|string} error Error object or message
           * @param {object} extra Additional context for the error
           * @param {string} cType Console method to use (default: ERROR)
           */
          handler(error, extra, cType = this.C.ERROR) {
            if (cType === this.C.DEBUG) {
              // if (!this.debug && !variables.debug) return;
              const message = String(error instanceof Error ? error.message : error);
              console.debug(
                `::CBCJS::DEBUG::| ${message} |::>`,
                typeof error === 'object' ? { error, extra } : extra,
              );
              return;
            }

            if (error instanceof CBCWarn) {
              cType = this.C.WARN;
            } else if (error instanceof CBCError) {
              cType = cType ?? this.C.ERROR;
            } else if (typeof error === 'string') {
              error = new CBCError(error, extra);
            } else if (error instanceof Error) {
              error.extra = extra;
            } else {
              error = new CBCError('Unknown Error', { error, extra });
            }

            cType = Object.values(this.C).includes(cType) ? cType : this.C.LOG;
            console[cType](`::CBC::${cType.toUpperCase()}::| ${error.message} |::>`, this.debug ? { error } : null);
          }

          /**
           * Send a debug message to the console
           * @param {String|Error} message The message
           * @param {any} extra Additional context to display
           */
          sendDebug(message, extra) {
            this.handler(message, extra, this.C.DEBUG);
          }

          /**
           * Check for Updates
           */
          checkVersion() {
            this.init(true).then((cbcjs) => cbcjs.__renderConsole());
          }

          /**
           * Register a card
           * @param {object} config Card configuration
           * @param {object} hass The latest hass object
           * @returns {CreativeButtonCardsJS} Chainable instance
           */
          addCard(config, hass) {
            if (!this.generateStats && !this.debug) return this;

            hass ??= this.hass;
            try {
              if (this.panel !== hass.panelUrl) {
                this.__setNewPanel(hass);
              }
              this.__trackStats(config);
            } catch (error) {
              this.handler(error, { config }, this.C.WARN);
            }

            return this;
          }

          /**
           * Initialize the Creative Button-Card runtime.
           * @param {boolean} mustCheck Must check for updates
           * @returns {Promise<CreativeButtonCardsJS>} CBCJS instance
           */
          async init(mustCheck = false) {
            mustCheck = this.debug || mustCheck;
            try {
              const checkWindowMs = this.__dToMs(this.checkFrequency);
              const shouldCheck =
                mustCheck ||
                !this.firstCheck ||
                !this.lastCheck ||
                !this.availableVersion ||
                (this.failQty > 0 && this.failQty <= 5) ||
                (this.failQty > 5 && Date.now() - Number(this.lastFail.getTime()) >= this.__dToMs(1)) ||
                Date.now() - Number(this.lastCheck.getTime()) >= Number(checkWindowMs);
              if (shouldCheck) await this.__setVersion(mustCheck);
              if (this.availableVersion && this.version !== this.availableVersion) {
                this.update = true;
                this.__notifyUpdate();
              }
            } catch (e) {
              this.handler(e);
            }
            return this;
          }

          /**
           * Setup a new panel context.
           * @param {object} hass The hass object to create from
           */
          __setNewPanel(hass) {
            this.panel = hass.panelUrl || window.location.pathname || 'unknown';
            this.panelId = this.hashPanels ? this.__anonymizePanelName(this.panel) : this.panel;
            this.lovelaceMode = hass?.panels?.[hass.panelUrl]?.config?.mode ?? 'unknown';
            this.addCard(variables.__config, hass);
          }

          /**
           * Collect lightweight per-panel template usage and co-usage counters.
           * @param {object} config Card configuration
           */
          __trackStats(config = {}) {
            const templates = this.__extractTemplates(config);
            if (!templates.length) return;

            const state = this.stats;
            const panelStats = (state.panels[this.panelId] ??= {
              panel: this.panelId,
              mode: this.lovelaceMode,
              templates: {},
              updatedAt: null,
            });
            panelStats.mode = this.lovelaceMode;

            const nowIso = new Date().toISOString();
            for (let i = 0; i < templates.length; i += 1) {
              const templateName = templates[i];
              panelStats.templates[templateName] = (panelStats.templates[templateName] ?? 0) + 1;
            }
            panelStats.updatedAt = nowIso;

            const uniqueTemplates = new Set(templates);
            const uniqueList = Array.from(uniqueTemplates);
            for (let i = 0; i < uniqueList.length; i += 1) {
              const templateName = uniqueList[i];
              const withMap = (state.with[templateName] ??= {});
              for (let j = 0; j < uniqueList.length; j += 1) {
                if (i === j) continue;
                const otherTemplate = uniqueList[j];
                withMap[otherTemplate] = (withMap[otherTemplate] ?? 0) + 1;
              }
            }

            this.statsDirty = true;
            this.__schedStats();
          }

          /**
           * Debounce localStorage writes for panel template stats.
           */
          __schedStats() {
            if (this.statsTimer) return;
            this.statsTimer = setTimeout(() => {
              this.statsTimer = null;
              if (!this.statsDirty) return;
              this.__saveStats();
            }, this.statsDelayMs);
          }

          /**
           * Persist panel template stats to localStorage.
           */
          __saveStats() {
            this.statsDirty = false;
            this.__ls('stats', this.stats, this.LS.SET);
          }

          /**
           * Return a fresh stats state container.
           * @returns {{version: number, panels: object, with: object}} Empty state
          */
          __emptyStats() {
            return {
              version: 2,
              panels: {},
              with: {},
            };
          }

          /**
           * Normalize existing localStorage payload and migrate older formats.
           * @param {object} stored Persisted stats payload
           * @returns {{version: number, panels: object, with: object}} Normalized state
          */
          __normStats(stored) {
            const empty = this.__emptyStats();
            if (!stored || typeof stored !== 'object') return empty;

            if (stored.version === 2 && stored.panels && stored.with) {
              return stored;
            }

            const migrated = this.__emptyStats();
            Object.entries(stored).forEach(([panelName, panelStats]) => {
              if (!panelStats || typeof panelStats !== 'object') return;

              const panelId = this.hashPanels ? this.__anonymizePanelName(panelName) : this.panel;
              const existingPanel = (migrated.panels[panelId] ??= {
                panel: panelId,
                mode: panelStats.mode ?? 'unknown',
                templates: {},
                updatedAt: panelStats.updatedAt ?? null,
              });

              Object.entries(panelStats.templates || {}).forEach(([templateName, qty]) => {
                const normalizedQty = qty === true ? 1 : Number(qty);
                if (!Number.isFinite(normalizedQty) || normalizedQty <= 0) return;
                existingPanel.templates[templateName] =
                  (existingPanel.templates[templateName] ?? 0) + Math.floor(normalizedQty);
              });
            });

            return migrated;
          }

          /**
           * Generate a deterministic anonymous panel identifier.
           * @param {string} panelName Raw panel name/path
           * @returns {string} Anonymous panel identifier
           */
          __anonymizePanelName(panelName) {
            const raw = `${String(panelName || 'unknown')}::cbc-panel-v1`;
            return `panel_${this.__hashString(raw)}`;
          }

          /**
           * Hash a string into a stable 16-char hex token.
           * @param {string} value Input value
           * @returns {string} 16-char lowercase hex hash
           */
          __hashString(value) {
            let h1 = 0xdeadbeef ^ value.length;
            let h2 = 0x41c6ce57 ^ value.length;

            for (let i = 0; i < value.length; i += 1) {
              const ch = value.charCodeAt(i);
              h1 = Math.imul(h1 ^ ch, 2654435761);
              h2 = Math.imul(h2 ^ ch, 1597334677);
            }

            h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
            h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);

            return `${(h2 >>> 0).toString(16).padStart(8, '0')}${(h1 >>> 0).toString(16).padStart(8, '0')}`;
          }

          /**
           * Normalize templates from a card config with minimal per-update work.
           * @param {object} config Card configuration
           * @returns {string[]} Template names
           */
          __extractTemplates(config = {}) {
            if (!config || typeof config !== 'object') return [];
            const template = config.template;
            if (typeof template === 'string' && template.trim()) {
              return [template.trim()];
            }
            if (!Array.isArray(template) || !template.length) {
              return [];
            }

            const out = [];
            for (let i = 0; i < template.length; i += 1) {
              const name = template[i];
              if (typeof name !== 'string') continue;
              const trimmed = name.trim();
              if (trimmed) out.push(trimmed);
            }

            return out;
          }

          /**
           * Build a manual stats report from persisted panel template stats.
           * @returns {object} Aggregated statistics
           */
          __getStats() {
            if (this.statsDirty) this.__saveStats();

            const source = this.__normStats(this.__ls('stats') ?? {});
            const panels = [];
            const templatesByName = {};
            let totalQty = 0;

            Object.values(source.panels || {}).forEach((panelStats) => {
              const templateNames = Object.keys(panelStats.templates || {}).sort();
              const panelQty = templateNames.reduce(
                (sum, templateName) => sum + Number(panelStats.templates[templateName] || 0),
                0,
              );

              totalQty += panelQty;
              panels.push({
                panel: panelStats.panel,
                mode: panelStats.mode ?? 'unknown',
                templates: templateNames,
                qty: panelQty,
                uniqueQty: templateNames.length,
                updatedAt: panelStats.updatedAt ?? null,
              });

              templateNames.forEach((templateName) => {
                const qty = Number(panelStats.templates[templateName] || 0);
                const templateStats = (templatesByName[templateName] ??= {
                  template: templateName,
                  panelQty: {},
                  qty: 0,
                  with: {},
                });

                templateStats.panelQty[panelStats.panel] = qty;
                templateStats.qty += qty;
              });
            });

            Object.entries(source.with || {}).forEach(([templateName, withMap]) => {
              const templateStats = (templatesByName[templateName] ??= {
                template: templateName,
                panelQty: {},
                qty: 0,
                with: {},
              });
              templateStats.with = Object.fromEntries(
                Object.entries(withMap || {})
                  .map(([otherTemplate, qty]) => [otherTemplate, Number(qty)])
                  .filter(([, qty]) => Number.isFinite(qty) && qty > 0)
                  .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0])),
              );
            });

            panels.sort((a, b) => a.panel.localeCompare(b.panel));
            const templates = Object.values(templatesByName).sort((a, b) =>
              a.template.localeCompare(b.template),
            );

            return {
              generatedAt: new Date().toISOString(),
              panelQty: panels.length,
              totalQty,
              uniqueQty: templates.length,
              panels,
              templates,
            };
          }

          /**
           * Return aggregated template stats and print a short console summary.
           * @returns {object} Aggregated statistics
           */
          getStats() {
            if (!this.generateStats && !this.debug) {
              this.handler(
                'Stats collection is disabled. Enable "generate_stats" in settings [ _cbc_settings.yaml ] to use this method.',
                {},
                this.C.ERROR
              );
              return null;
            }

            const stats = this.__getStats();
            console.info('::CBC::INFO::| Panel template stats generated |::>', {
              panelQty: stats.panelQty,
              uniqueQty: stats.uniqueQty,
              totalQty: stats.totalQty,
            });
            return stats;
          }

          /**
           * Parse stored values.
           * @param {any} value Stored value
           * @param {LS} proc LS.MAP will hydrate as Map() @see this.LS
           * @returns {any} Parsed value or original
           */
          __lsHydrate(value, proc = this.LS.DEFAULT) {
            try {
              if (typeof value !== 'string' || value.startsWith('cbc-') || /^v\d+((\.\d+)+)?$/g.test(value)) {
                return value;
              }
              if (value === 'true' || value === 'false') return value === 'true';
              if (value === 'null' || value === 'undefined' || value === '') return null;
              if (/^\d{13,}$/.test(value)) return new Date(Number(value));
              if (/^\d+$/.test(value)) return Number(value);
              const out = JSON.parse(value);
              return proc === this.LS.MAP ? new Map(Object.entries(out)) : out;
            } catch (error) {
              this.handler(error, { value }, this.C.DEBUG);
              return value;
            }
          }

          /**
           * Convert values to JSON for storage if they are objects or arrays.
           * @param {any} value Stored value
           * @returns {any} Parsed value or original
           */
          __lsToStore(value) {
            if (typeof value !== 'object') return value;

            try {
              if (value instanceof Date) return value.getTime();
              return value instanceof Map
                ? JSON.stringify(Object.fromEntries(value))
                : JSON.stringify(value);
            } catch (error) {
              this.handler('Value could not be stringified for storage', { value, error });
              return value;
            }
          }

          __lsDelete(name) {
            return this.__ls(name, null, this.LS.DELETE);
          }

          __lsInc(name, amount = 1) {
            return this.__ls(name, amount, this.LS.INCREMENT);
          }

          /**
           * LocalStorage helper with common operations.
           * @param {string} name Storage key
           * @param {any} value Value to set/merge (default: null)
           * @param {number} proc Operation flag from LS (default: LS.DEFAULT) @see CreativeButtonCardsJS.LS
           * @returns {any} Retrieved/Stored value
           */
          __ls(name, value = null, proc = this.LS.DEFAULT) {
            const procName = 'LS.' + Object.keys(this.LS).find((key) => this.LS[key] === proc);
            let out;
            let val;

            try {
              if (!name || typeof name !== 'string') {
                throw new CBCError('You must provide a string for the name of the LocalStorage key');
              }

              name = name.startsWith('cbc_') ? name : `cbc_${name}`;

              if (proc === this.LS.DELETE) {
                localStorage.removeItem(name);
                return undefined;
              }

              if (!value && proc === this.LS.INCREMENT) value = 1;
              val = localStorage.getItem(name) ?? undefined;

              if (val === undefined && value === null) {
                this.handler(
                  `No value found in storage and none provided for ${procName} operation: ${name}`,
                  { val, value },
                  this.C.DEBUG,
                );
                return undefined;
              }

              out = this.__lsHydrate(val, proc);

              switch (proc) {
                case this.LS.SET:
                  out = value;
                  break;
                case this.LS.UPDATE:
                  if (!value || (val && val === this.__lsToStore(value))) {
                    return out;
                  }
                  out = value;
                  break;
                case this.LS.INCREMENT:
                  out = val ? Number(val) + Number(value) : Number(value);
                  break;
                case this.LS.MAP:
                  if (out && !(out instanceof Map)) {
                    throw new CBCWarn(`Stored value is not a Map`, { procName, val, value });
                  } else if (out && !value) {
                    return out;
                  } else if (!(value instanceof Map)) {
                    throw new CBCWarn(`Provided value is not a Map`, { procName, val, value });
                  }
                  out = out ? new Map([...out, ...value]) : value;
                  break;
                case this.LS.DEFAULT:
                default:
                  if (out !== undefined) {
                    return out;
                  }
                  out = value;
                  break;
              }

              localStorage.setItem(name, this.__lsToStore(out));
            } catch (error) {
              error.message += ` for ${procName} operation: ${name}`;
              this.handler(error);
              return undefined;
            }

            return this.__lsHydrate(localStorage.getItem(name), proc);
          }

          /**
           * Check for the latest available version and set the properties.
           * @param {boolean} manual Is a manual request to check (default: false)
           * @returns {CreativeButtonCardsJS} this for chaining
           */
          async __setVersion(manual = false) {
            if (!this.checkUpdates && !manual) {
              return this;
            }

            let out;
            const thisCheck = new Date();
            this.lastCheck = this.__ls('last_check', thisCheck);
            this.firstCheck = this.__ls('first_check', thisCheck);

            try {
              const response = await fetch(variables?.__cbc_api_url ?? 'https://api.cbc.willfurphy.com/version');

              if (!response.ok) {
                throw new CBCError(`HTTP Error ${response.status}: ${response.statusText}`, { response });
              }

              const responseBody = await response.json();
              out = responseBody?.data?.version ?? null;

              if (!out || typeof out !== 'string' || !out.startsWith('v')) {
                throw new CBCError('Empty or incorrect version information received', responseBody);
              }

              this.availableVersion = this.__ls('available_version', out, this.LS.UPDATE);
              this.updateLink = this.__ls('update_link', responseBody?.data?.updateLink, this.LS.UPDATE);
              this.lastCheck = this.__ls('last_check', thisCheck, this.LS.SET);
              this.failQty = this.__ls('check_fail_qty', 0, this.LS.SET);
              this.checkQty = this.__lsInc('check_qty');
            } catch (error) {
              this.lastFail = this.__ls('check_last_fail', Date.now(), this.LS.SET);
              this.failQty = this.__lsInc('check_fail_qty');
              if (this.firstCheck?.getTime() === thisCheck.getTime()) this.__lsDelete('first_check');
              this.handler(error);
            }

            return this;
          }

          /**
           * Render the version information in the console.
           * @returns {CreativeButtonCardJS} this for chaining
           */
          __renderConsole() {
            console.info(
              '%c CREATIVE BUTTON-CARD TEMPLATES %c '.concat(
                this.version,
                ' ',
                this.update
                  ? `\n%c Update Available (${this.lastCheck?.toLocaleDateString()})  %c ${this.availableVersion} `
                  : '',
                this.update
                  ? `\n%c${this.updateLink || `https://github.com/wfurphy/creative-button-card-templates/releases/tag/${this.availableVersion}`}`
                  : '\n%chttps://github.com/wfurphy/creative-button-card-templates',
              ),
              'color: black; background: #1bccac; font-weight: 700;',
              'color: #1bccac; background: black; font-weight: 700;',
              this.update ? 'color: black; background: #ff7f50; font-weight: 700;' : '',
              this.update ? 'color: #ff7f50; background: black; font-weight: 500;' : '',
              '',
            );
            return this;
          }

          /**
           * Send Notification if there is an update available
           * @returns {CreativeButtonCardJS} this for chaining
           */
          __notifyUpdate() {
            if (!this.update || !this.checkNotify) return;

            helpers.toast({
              message: `Creative Button-Card Update Available`,
              duration: 5000,
              dismissible: true,
              action: {
                text: `Get ${this.availableVersion}`,
                action: () =>
                  setTimeout(
                    () =>
                      window.open(
                        this.updateLink ||
                          `https://github.com/wfurphy/creative-button-card-templates/releases/tag/${this.availableVersion}`,
                        '_blank',
                      ),
                    500,
                  ),
              },
            });
            return this;
          }

          /**
           * Days to Milliseconds
           * @param {number} d Days
           * @returns {number} Milliseconds
           */
          __dToMs(d) {
            return Number(d) * 24 * 60 * 60 * 1000;
          }
        }
      ]]]
    cbcjs:
      force_eval: true
      value: >
        [[[
          if (!window.cbcJS) {
            window.CBCError = variables.__cbc_error;
            window.CBCWarn = variables.__cbc_warn;
            window.cbcJS = new variables.__cbc_js_class(hass);
            cbcJS
              .init()
              .then((cbcjs) => cbcjs.setView().__renderConsole());
          }

          cbcJS.addCard(variables?.__config, hass);
          window.addEventListener('location-changed', () => cbcJS.setView());

          return cbcJS;
