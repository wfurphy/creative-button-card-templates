############| +Addon > Creative Button-Card Javascript Object (cbcjs) |###########################>
cbcjs:
  template:
    - _cbc_settings
    - bc_config
  variables:
    debug: true
    __cbc_version: v0.3.1
    __cbc_lovelace_method: "[[[ return hass?.panels?.[hass.panelUrl]?.config?.mode ?? 'unknown' ]]]"
    __cbc_error: >
      [[[
        return class CBCError extends Error {
          constructor (message, extra) {
            super(message);
            this.extra = extra;
            this.cbcjs = window?.cbcJS ?? null;
          }
        }
      ]]]
    __cbc_warn: >
      [[[
        return class CBCWarn extends CBCError {};
      ]]]
    __cbc_js_class: >
      [[[
        return class CreateiveButtonCardsJS {
          /**
          * LS.<OP> LocalStorage Operations:
          *   DEFAULT: Retreive and only overwrite if udefined or empty
          *   SET: Override any existing value and return new value
          *   UPDATE: Retreive and only overwrite if different
          *   INCREMENT: Numbers addition and return new value
          *   MAP: Merge a new MAP with the stored MAP and return merged
          *   DELETE: Remove item from storage
          * @type {object}
          */
          LS = {
            DEFAULT: 0,
            SET: 10,
            UPDATE: 20,
            INCREMENT: 30,
            MAP: 40,
            DELETE: 90,
          };

          /**
          * C.<TYPE> Console Notice Level
          *   ERROR, WARN, LOG, INFO, DEBUG
          * @type {object}
          */
          C = {
            ERROR: 'error',
            WARN: 'warn',
            LOG: 'log',
            INFO: 'info',
            DEBUG: 'debug',
          }

          /**
          * Create a new CBCJS instance.
          * @param {object} hass Home Assistant object
          */
          constructor(hass) {
            this.update = false;
            this.globals = {};
            this.css = {};
            this.hass = hass;
            this.updatedAt = new Date().getTime();
            this.browserId = this.__ensureBrowserId();
            this.debug = variables?.debug ?? false;
            this.totalCardCalls = 0;
            this.__setNewPanel(hass);
            // ::> Local Storage
            this.checkUpdates = this.__ls(
              'cbc_check_version',
              variables?.__cbc_check?.updates ?? true,
              this.LS.SET,
            );
            this.checkFrequency = this.__ls(
              'cbc_check_frequency',
              Math.min(Math.max(variables?.__cbc_check?.frequency ?? 28, 7), 90),
              this.LS.SET,
            );
            this.checkNotify = this.__ls(
              'cbc_check_notify',
              variables?.__cbc_check?.notify ?? true,
              this.LS.SET,
            );
            this.checkSendData = this.__ls(
              'cbc_send_data',
              variables?.__cbc_check.send_data ?? true,
              this.LS.SET,
            );
            this.stats = this.__ls('cbc_stats', null, this.LS.MAP);
            // ::> Version Info
            this.version = this.__ls('cbc_version', variables?.__cbc_version || 'v0.0.0', this.LS.UPDATE);
            this.availableVersion = this.__ls('cbc_available_version');
            this.firstCheck = this.__ls('cbc_first_check');
            this.lastCheck = this.__ls('cbc_last_check');
          }

          /**
          * Run a light effect on a target entity.
          * @param {string} ef Effect name
          * @param {string} entity Entity id
          */
          runLightEffect(ef, entity) {
            const data = {
              entity_id: entity,
              effect: ef,
            };

            let theme = this.hass.states[`select.${entity.replace('light.')}_theme`]?.state;
            if (theme && theme !== 'unknown') data.theme = theme;
            this.hass.callService('light', 'turn_on', data);
          }

          /**
          * Select an option on a select entity.
          * @param {string} val Option name
          * @param {string} entity Entity id
          */
          selectOption(val, entity) {
            this.hass.callService('select', 'select_option', {
              entity_id: entity,
              option: val,
            });
          }

          /**
          * Call a Home Assistant service action.
          * @param {string} domain Service domain
          * @param {string} action Service action
          * @param {object} data Service payload
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          action(domain, action, data) {
            this.hass.callService(domain, action, data);

            return this;
          }

          /**
          * Execute a list of service actions.
          * @param {Array} list List of [domain, action, data]
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          actionList(list = []) {
            list.forEach((l) => this.action(...l));
            return this;
          }

          /**
          * Add CSS variables for templates.
          * @param {object} css CSS variable map
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          addCss(css = {}) {
            this.css = { ...this.css, ...css };
            return this;
          }

          /**
          * Set the current view path.
          * @param {string} path View path
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          setView(path) {
            path = path ?? window.location.pathname;
            this.view = path.substring(1);
            return this;
          }

          /**
          * Insert CSS variables into the page when view changes.
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          insertStyles() {
            const html = document.getElementsByTagName('html')[0];

            if (!variables?.css || html.getAttribute('data-cbc-view') === this.view) {
              return this;
            }

            for (let prop in variables?.css) {
              html.style.setProperty(`--cbc-${prop.replace('_', '-')}`, this.css[prop]);
            }

            html.setAttribute('data-cbc-view', this.view);
            return this;
          }

          handler(error, extra, cType = this.C.ERROR) {
            if (cType === 'debug' && variables.debug) {
              let message = error instanceof Error ? error.message : error;
              message = typeof message === 'string' ? `| ${message} |::>` : '>';
              console.debug(`::CBC::Debug::${message}`, { error, extra });
              return;
            }

            if (error instanceof CBCWarn) {
              cType = this.C.WARN;
            } else if (error instanceof CBCError) {
              cType = cType ?? this.C.ERROR;
            } else if (typeof error === 'string') {
              error = new CBCError(error, extra);
            } else if (error instanceof Error) {
              error = new CBCError(error.message, extra);
            } else {
              error = new CBCError('Unknown Error', { error, extra });
            }

            cType = Object.values(this.C).includes(cType) ? cType : this.C.LOG;
            console[cType](`::CBC::${cType.toUpperCase()}::| ${error.message} |::>`, { error });
          }

          /**
           * Check for Updates
           */
          checkUpdate() {
            this.init(true).then(cbcjs => {
              cbcjs.__renderConsole();
            });

            return this;
          }

                    /**
          * Register a card
          * @param {object} config Card configuration
          * @param {object} hass The latest hass object
          * @returns {CreateiveButtonCardsJS} Chainable instance
          */
          addCard(config, hass) {
            hass = hass ?? this.hass;
            try {
              if (this.panel !== hass.panelUrl) {
                this.__setNewPanel(hass);
              }

              this.cards.add(config);
              this.totalCardCalls++;

              if (!this.stats || this.prevCardsQty < this.cards.size || !this.stats.get(btoa(this.panel))) {
                this.stats = this.__ls('cbc_stats', this.__getStats(), this.LS.MAP);
              }

              this.prevCardsQty = this.cards.size;
            } catch (error) {
              this.handler(error, { config }, this.C.WARN);
            }

            return this;
          }

          /**
          * Setup new panel and card stats
          * @param {object} hass The hass object to create from
          */
          __setNewPanel(hass) {
            this.cards = new Set();
            this.panel = hass.panelUrl;
            this.lovelaceMode = hass?.panels?.[hass.panelUrl]?.config?.mode ?? 'unknown';
            this.addCard(variables.__config, hass);
          }

          /**
          * Parse stored values if they are JSON strings.
          * @param {any} value Stored value
          * @param {LS} proc LS.MAP will hydrate as Map() @see LS
          * @returns {any} Parsed value or original
          */
          __lsHydrate(value, proc = this.LS.DEFAULT) {
            if (typeof value !== 'string') return value;

            try {
              const out = JSON.parse(value);
              return proc === this.LS.MAP ? new Map(Object.entries(out)) : out;
            } catch (error) {
              this.handler(error, value, this.C.DEBUG);
              return proc === this.LS.MAP ? undefined : value;
            }
          }

          /**
          * Convert values to JSON for storage if they are objects or arrays.
          * @param {any} value Stored value
          * @returns {any} Parsed value or original
          */
          __lsToStore(value) {
            if (typeof value !== 'object') return value;

            try {
              return value instanceof Map ? this.__mapToStore(value) : JSON.stringify(value);
            } catch (error) {
              this.handler('Value could not be stringified for storage', { value, error });
              return value;
            }
          }

          /**
          * Convert a Map to a JSON string for storage.
          * @param {Map} value Map to store
          * @returns {string} Stringified map entries
          */
          __mapToStore(value) {
            return JSON.stringify(Object.fromEntries(value));
          }

          /**
          * LocalStorage helper with common operations.
          * @param {string} name Storage key
          * @param {any} value Value to set/merge (default: null)
          * @param {number} proc Operation flag from LS (default: LS.DEFAULT) @see CreateiveButtonCardsJS.LS
          * @returns {any} Retreived/Stored value
          */
          __ls(name, value = null, proc = this.LS.DEFAULT) {
            const procName = 'LS.' + Object.keys(this.LS).find((key) => this.LS[key] === proc);
            if (!value && proc === this.LS.INCREMENT) value = 1;
            let out;

            try {
              let val = localStorage.getItem(name) ?? undefined;

              if (!val && !value) {
                throw new CBCWarn(`No value found in storage and none provided`);
              }

              out = value;

              switch (proc) {
                case this.LS.DEFAULT:
                  if (val) {
                    return this.__lsHydrate(val);
                  }
                  break;
                case this.LS.UPDATE:
                  if (!value || (val && val === this.__lsToStore(value))) {
                    return this.__lsHydrate(val, proc);
                  }
                  break;
                case this.LS.DELETE:
                  localStorage.removeItem(name);
                  return undefined;
                case this.LS.INCREMENT:
                  out = val ? Number(val) + Number(value) : Number(value);
                  break;
                case this.LS.MAP:
                  if (val) {
                    val = this.__lsHydrate(val, proc);
                    if (!(val instanceof Map)) {
                      throw new CBCWarn(`Stored value is not a Map`,{ procName, val, value });
                    } else if (!value) {
                      return val;
                    } else if (!(value instanceof Map)) {
                      throw new CBCWarn(`Provided value is not a Map`, { procName, val, value });
                    }
                    out = new Map([...val, ...value]);
                  }
                  break;
                case this.LS.SET:
                default:
                  break;
              }

              localStorage.setItem(name, this.__lsToStore(out));
            } catch (error) {
              error.message += ` for ${procName} operation: ${name}`
              this.handler(error);
              return undefined;
            }

            return this.__lsHydrate(localStorage.getItem(name), proc);
          }

          /**
          * Generate a new install identifier.
          * @returns {string} Install identifier
          */
          __createBrowserId() {
            if (window.crypto?.randomUUID) {
              return window.crypto.randomUUID();
            }

            return `cbc-${Date.now()}-${Math.random().toString(16).slice(2)}`;
          }

          /**
          * Ensure a stable install identifier is available.
          * @returns {string} Install identifier
          */
          __ensureBrowserId() {
            const existing = this.__ls('cbc_browser_id');
            if (existing) return existing;

            const browserId = this.__createBrowserId();
            this.__ls('cbc_browser_id', browserId, this.LS.SET);
            return browserId;
          }

          /**
          * Check for the latest available version.
          * @param {boolean} manual Is a manual request to check (default: false)
          * @returns {Promise<string | null>} Version info
          */
          async __getVersion(manual = false) {
            if (!this.checkUpdates && !manual) {
              return null;
            }

            let out;
            const thisCheck = new Date().getTime();
            this.lastCheck = this.__ls('cbc_last_check', thisCheck);

            const req = {
              version: this.version,
              installId: this.browserId,
              checkFrequency: this.checkFrequency,
              thisCheck: thisCheck,
              lastCheck: this.lastCheck,
              sendData: this.checkSendData,
            };

            if (this.checkSendData || this.debug) {
              const stats = this.__getStats();
              this.stats = this.__ls('cbc_stats', stats, this.LS.MAP);
              req.stats = Object.fromEntries(this.stats);
             // this.handler('__getVersion: stats, this.stats, req', { stats, thisStats: this.stats, req }, this.C.DEBUG); // DEBUG
            }

            try {
              const response = await fetch('https://api.cbc.willfurphy.com/version', {
                method: 'POST',
                headers: {
                  authorization: 'y2xdfcth5T1WeS2uhp3s2FEjNBxzEgs75pAG0s0M9y',
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify(req),
              });
              
              if (!response.ok) {
                throw new CBCError(`HTTP Error ${response.status}: ${response.statusText}`, { response });
              }

              const responseBody = await response.json();

              console.log('::CBC::(response)::>', responseBody); // DEBUG

              out = responseBody?.data?.version ?? null;

              if (!out || typeof out !== 'string' || !out.startsWith('v')) {
                throw new CBCError('Empty or incorrect version information received', responseBody);
              }

              this.availableVersion = this.__ls('cbc_available_version', out, this.LS.UPDATE);

              if (!this.firstCheck) {
                this.firstCheck = this.__ls('cbc_first_check', thisCheck, this.LS.SET);
                const nd = new Date(thisCheck);
                this.nextCheck = this.__ls('cbc_next_check', nd.setDate(nd.getDate() + 7).getTime(), this.LS.SET);
              }
            } catch (error) {
              this.handler(error);
            }

            return out;
          }

          /**
          * Aggregate card stats.
          * @returns {Map} Map of stats: [ panel => { mode, cardQty, cards: {template: qty}, with: {templatepair: qty} } ]
          */
          __getStats() {
            const outCards = {};
            const withCards = {};

            this.cards.forEach((card) => {
              if (Array.isArray(card.template)) {
                card.template.forEach((t, i) => {
                  for (let j = i + 1; j < card.template.length; j++) {
                    const [t1, t2] = [card.template[i], card.template[j]].sort();
                    if (t1 !== t2) {
                      const key = `${t1}|${t2}`;
                      withCards[key] = (withCards[key] || 0) + 1;
                    }
                  }

                  outCards[t] = (outCards[t] || 0) + 1;
                });
              } else {
                outCards[card.template] = (outCards[card.template] || 0) + 1;
              }
            });

            const stats = new Map();
            stats.set(btoa(this.panel), {
              mode: this.lovelaceMode,
              cardQty: this.cards.size,
              cards: outCards,
              with: withCards,
            });

            return stats;
          }

          /**
           * Render the version information in the console.
           * @returns {CreativeButtonCardJS} this for chaining
           */
          __renderConsole() {
            console.info(
              '%c CREATIVE BUTTON-CARD TEMPLATES %c '.concat(
                this.version,
                ' ',
                this.update
                  ? `\n%c Update Available (${new Date(this.lastCheck).toLocaleDateString()})  %c ${this.availableVersion} `
                  : '',
                this.update 
                  ? `\n%chttps://github.com/wfurphy/creative-button-card-templates/releases/tag/${this.availableVersion}`
                  : '\n%chttps://github.com/wfurphy/creative-button-card-templates',
              ),
              'color: black; background: #1bccac; font-weight: 700;',
              'color: #1bccac; background: black; font-weight: 700;',
              this.update ? 'color: black; background: #ff7f50; font-weight: 700;' : '',
              this.update ? 'color: #ff7f50; background: black; font-weight: 500;' : '',
              '',
            );
            return this;
          }

          /**
           * Send Notification if there is an update available
           * @returns {CreativeButtonCardJS} this for chaining
           */
          __notifyUpdate() {
            if (!this.update || !this.checkNotify) return;
            
            helpers.toast({
                message: `Creative Button-Card Update Available`,
                duration: 5000,
                dismissable: true,
                action: {
                  text: `Get ${this.availableVersion}`,
                  action: () => setTimeout(() => window.open(`https://github.com/wfurphy/creative-button-card-templates/releases/tag/${this.availableVersion}`, '_blank'), 500)
                }
              }
            );
            return this;
          }

          /**
           * Days to Milliseconds
           * @param {number} d Days
           * @returns {number} Milliseconds
           */
          __dToMs(d) {
            return Number(d) * 24 * 60 * 60 * 1000;
          }

          /**
          * Initialize the Creative Button-Card runtime.
          * @param {boolean} mustCheck Must check for updates
          * @returns {Promise<CreateiveButtonCardsJS>} CBCJS instance
          */
          async init(mustCheck = false) {
            try {
              const checkWindowMs = this.__dToMs(this.checkFrequency);
              const shouldCheck = mustCheck
                || !this.lastCheck
                || !this.availableVersion
                || (this.firstCheck && (Date.now() - Number(this.firstCheck) >= this.__dToMs(7)));
                || (Date.now() - Number(this.lastCheck) >= Number(checkWindowMs));
              if (shouldCheck || this.debug) await this.__getVersion(mustCheck);
              if (this.availableVersion && this.version !== this.availableVersion) {
                this.update = true;
                this.__notifyUpdate();
              }
            } catch (e) {
              this.handler(e);
            }
            return this;
          }
        }
      ]]]
    __cbcjs:
      force_eval: true
      value: >
        [[[
          if (!window.cbcJS) {
            window.CBCError = variables.__cbc_error;
            window.CBCWarn = variables.__cbc_warn;
            window.cbcJS = new variables.__cbc_js_class(hass);
            cbcJS
              .init()
              .then((cbcjs) => cbcjs.__renderConsole());
          }

          cbcJS.addCard(variables?.__config, hass);
          
          return cbcJS;
        ]]]

##
