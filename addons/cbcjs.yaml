############| +Addon > Creative Button Card Javascript Object (cbcjs) |###########################>
##> v1 Rebuild as class
cbcjs:
  variables:
    __cbcjs:
      force_eval: true
      value: >
        [[[
          class CreateiveButtonCardsJS {
            constructor(hass) {
              this.version = "0.3.0";
              this.update = false;
              this.globals = {};
              this.css = {};
              this.count = 0;
              this.hass = hass;
              this.ct = new Date().getTime();
            }

            runLightEffect(ef, entity) {
              const data = {
                entity_id: entity,
                effect: ef,
              };

              let theme =
                this.hass.states[`select.${entity.replace("light.")}_theme`]?.state;
              if (theme && theme !== "unknown") data.theme = theme;
              this.hass.callService("light", "turn_on", data);
            }

            selectOption(val, entity) {
              this.hass.callService("select", "select_option", {
                entity_id: entity,
                option: val,
              });
            }

            action(domain, action, data) {
              this.hass.callService(domain, action, data);

              return this;
            }

            actionList(list = []) {
              list.forEach((l) => this.action(...l));
              return this;
            }

            addCss(css = {}) {
              this.css = { ...this.css, ...css };
              return this;
            }

            setView(path) {
              path = path ?? window.location.pathname;
              this.view = path.substring(1);
              return this;
            }

            insertStyles() {
              const html = document.getElementsByTagName("html")[0];

              if (!variables.css || html.getAttribute("data-cbc-view") === this.view)
                return this;

              for (let prop in variables.css) {
                html.style.setProperty(`--cbc-${prop.replace("_", "-")}`, this.css[prop]);
              }

              html.setAttribute("data-cbc-view", this.view);
              return this;
            }

            async getVersion() {
              // TODO: Update to production link and implement update available notification
              const out = {
                v: this.version,
                cv: '',
              };

              try {
                const response = await fetch(
                  "https://raw.githubusercontent.com/wfurphy/creative-button-card-templates/refs/heads/develop/.cbcv"
                );
                out.cv = await response.text();

                if (parseFloat(out.v) < parseFloat(out.cv)) {
                  this.update = true;
                }
              } catch (e) {
                console.warn('::::WARNING::::> Could not check CBC Version', e);
              }

              return out;
            }
          }

          if (!window.cbcJS) {
            window.cbcJS = new CreateiveButtonCardsJS(hass);
            cbcJS.getVersion().then(v => console.info(
                "%c CREATIVE BUTTON-CARD TEMPLATES %c  ".concat(v.v, " %c ", cbcJS.update ? `Update Available (${v.cv})` : ''),
                "color: black; background: #1bccac; font-weight: 700;",
                "color: #1bccac; background: black; font-weight: 700;",
                "color: #D58C25FF; background: black; font-weight: 700;"
              ));
          }

          cbcJS.count++;
        ]]]

##
