####{ CreativeBC }####| Entity |####[ github.com/wfurphy/creative-button-card-templates ]####>
# :: @Changes v0.3 ::> Create attributes from other entities
# :: @Changes v0.3 ::> Breaking: Changed attributes to display flex
# :: @Changes v0.3 ::> Breaking: Added deduplication by id for attributes
# :: @Changes v0.3 ::> Breaking: `id: state` no longer works. Now `use_state: true` for state of main entity. Attribute defined `entity` defaults to `use_state: true`
entity:
  template: 
    - button_landscape
  variables:
    __dedupeAtts: >
      [[[
        return (atts) => [
          ...new Map(
            atts.map((v, i) => [
              v.id ? v.id : Symbol(i),
              v
            ])
          ).values()
        ];
      ]]]
    off_hide_info: true
    ## attr @deprecated v0.2 replaced by attributes
    attr: []
    attributes: []
    attribute_icon_color: var(--state-icon-color)
    __defaults:
      id: null
      entity: null
      use_state: null
      icon: 'mdi:layers-plus'
      state: null
      units:
      prefix_units: false
  show_state: false
  show_label: true
  label: >
    [[[
        variables.attributes = [...variables.attr, ...variables.attributes]; // for @deprecated variables.attr

        if (!variables.attributes || !variables.attributes.length) return '';

        // Dedupe by id
        const atts = variables.__dedupeAtts(variables.attributes);

        let lab = `
          <style>
            div.cbc-attr-container {
              display: flex;
              flex-flow: row wrap;
            }
            div.cbc-attr {
              padding: 1px 4px 1px 1px
            }
            ha-icon.cbc-icon {
              color: ${variables.attribute_icon_color};
              width:18px; 
              padding-right: 5px; 
            }
            .cbc-units {
              font-size: 80%;
              opacity: 0.6;
            }
          </style>
          <div class="cbc-attr-container">
          `;
        
        atts.forEach(function(a,i) {
          const at = {...variables.__defaults, ...a};
          const ae = at.entity ? states[at.entity] : entity;
          const t = at.use_state ?? Boolean(at.entity);
          at.display = at.state ?? (t ? ae.state : ae.attributes[at.id]);
          at.units = at.units ?? ae?.attributes?.unit_of_measurement ?? '';
          at.icon = at.icon ?? hass.entities[ae.entity_id]?.icon;

          const state = `<span class="cbc-value">${at.display}</span>`;
          const units = `<span class="cbc-units">${at.units}</span>`;

          lab += `<div id="cbc-attr${i}-${at.id}" class="cbc-attr ellipsis">
                    <ha-icon icon="${at.icon}" class="cbc-icon"></ha-icon>`;
          
          if (at.prefix_units) {
            lab += units + state;
          } else {
            lab += state + units;
          }

          lab += `</div>`;
        })
        
        return `${lab}</div>`;
    ]]]
  styles:
    grid:
      - grid-template-rows: >
          [[[
            const atts = variables.__dedupeAtts(variables.attributes);

            if (!atts || atts.length < 2) return '1fr 1fr';

            // ::v0.3::State check for false or OFF as ON is not always the active state value.
            return entity.state && entity.state !== 'off' ? '1fr 2fr' : '1fr 1fr';
          ]]]
          
#########################################################################/
  
